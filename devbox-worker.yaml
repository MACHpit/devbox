AWSTemplateFormatVersion: "2010-09-09"
Description: "MACHpit DevBox Worker - ephemeral autonomous development agent"

Parameters:
  AmiId:
    Type: AWS::EC2::Image::Id
  InstanceType:
    Type: String
    Default: t3.medium
  KeyPairName:
    Type: String
    Default: machpit-devbox
  SubnetId:
    Type: String
  VpcId:
    Type: String
  S3Bucket:
    Type: String
    Default: machpit-devbox
  JobS3Key:
    Type: String
  IdleMinutes:
    Type: Number
    Default: 120
  GithubPatSecret:
    Type: String
    Default: machpit/github-pat
  StackName:
    Type: String

Resources:

  DevBoxRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackName}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: machpit-devbox-worker-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:DeleteStack
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${StackName}/*"

  DevBoxInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${StackName}-profile"
      Roles:
        - !Ref DevBoxRole

  DevBoxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MACHpit DevBox worker SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  DevBoxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref DevBoxInstanceProfile
      SecurityGroupIds:
        - !Ref DevBoxSecurityGroup
      Tags:
        - Key: Name
          Value: !Ref StackName
        - Key: machpit-devbox
          Value: "true"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          LOG=/var/log/devbox-bootstrap.log
          exec > >(tee -a $LOG) 2>&1

          echo "=== MACHpit DevBox Bootstrap ==="
          echo "Stack: ${StackName}"
          echo "Job:   ${JobS3Key}"
          date

          # ── System packages ────────────────────────────────────────────────
          dnf update -y --quiet
          dnf install -y git python3 python3-pip jq unzip at --quiet
          pip3 install pyyaml --quiet

          # ── AWS CLI v2 ─────────────────────────────────────────────────────
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --update

          # ── GitHub CLI ─────────────────────────────────────────────────────
          dnf install -y 'dnf-command(config-manager)' --quiet
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh --quiet

          # ── mach helper ───────────────────────────────────────────────────
          aws s3 cp s3://${S3Bucket}/devbox/mach /usr/local/bin/mach
          chmod +x /usr/local/bin/mach

          # ── Fetch GitHub PAT ──────────────────────────────────────────────
          GITHUB_PAT=$(aws secretsmanager get-secret-value \
            --secret-id ${GithubPatSecret} \
            --region ${AWS::Region} \
            --query SecretString \
            --output text)

          echo "$GITHUB_PAT" | gh auth login --with-token
          git config --global credential.helper '!gh auth git-credential'
          git config --global user.email "devbox@machpit.com"
          git config --global user.name "MACHpit DevBox"

          # ── Fetch job definition ───────────────────────────────────────────
          mkdir -p /opt/devbox
          aws s3 cp s3://${S3Bucket}/${JobS3Key} /opt/devbox/job.json

          REPO=$(jq -r '.repo'      /opt/devbox/job.json)
          BRANCH=$(jq -r '.branch'  /opt/devbox/job.json)
          TASK=$(jq -r '.task'      /opt/devbox/job.json)
          TEST_CMD=$(jq -r '.test_cmd // ""' /opt/devbox/job.json)
          ON_SUCCESS=$(jq -r '.on_success // "pr"' /opt/devbox/job.json)

          echo "repo=$REPO  branch=$BRANCH  task=$TASK"

          # Export for mach helper
          echo "export STACK_NAME=${StackName}"    >> /etc/profile.d/devbox.sh
          echo "export DEVBOX_S3_BUCKET=${S3Bucket}" >> /etc/profile.d/devbox.sh
          echo "export AWS_REGION=${AWS::Region}"  >> /etc/profile.d/devbox.sh
          echo "export MACH_REPO_DIR=/opt/devbox/workspace/repo" >> /etc/profile.d/devbox.sh

          # ── Clone repo ─────────────────────────────────────────────────────
          mkdir -p /opt/devbox/workspace
          cd /opt/devbox/workspace
          gh repo clone "$REPO" repo
          cd repo

          # ── Checkout / create branch ───────────────────────────────────────
          git fetch --all
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # ── Load .devbox.yml if present ────────────────────────────────────
          if [ -f .devbox.yml ]; then
            echo "Loading .devbox.yml"
            SETUP_CMD=$(python3 -c "
import yaml
d = yaml.safe_load(open('.devbox.yml'))
print(d.get('setup',''))
" 2>/dev/null || echo "")
            TEST_CMD_OVERRIDE=$(python3 -c "
import yaml
d = yaml.safe_load(open('.devbox.yml'))
print(d.get('test',''))
" 2>/dev/null || echo "")
            [ -n "$SETUP_CMD" ]          && eval "$SETUP_CMD"
            [ -n "$TEST_CMD_OVERRIDE" ]  && TEST_CMD="$TEST_CMD_OVERRIDE"

            python3 -c "
import yaml, subprocess, json
d = yaml.safe_load(open('.devbox.yml'))
for secret_name in d.get('secrets', []):
    r = subprocess.run(['aws','secretsmanager','get-secret-value',
        '--secret-id', secret_name, '--query','SecretString','--output','text'],
        capture_output=True, text=True)
    for k, v in json.loads(r.stdout.strip()).items():
        with open('/etc/environment','a') as f:
            f.write(f'{k}={v}\n')
" 2>/dev/null || true
          fi

          # ── Run tests if headless ──────────────────────────────────────────
          EXIT_CODE=0
          if [ "$TASK" = "headless" ] && [ -n "$TEST_CMD" ]; then
            echo "Running: $TEST_CMD"
            eval "$TEST_CMD" || EXIT_CODE=$?
          fi

          # ── Report result ──────────────────────────────────────────────────
          STATUS="success"
          [ $EXIT_CODE -ne 0 ] && STATUS="failed"

          python3 -c "
import json, datetime
result = {
    'stack':     '${StackName}',
    'repo':      '$REPO',
    'branch':    '$BRANCH',
    'status':    '$STATUS',
    'exit_code': $EXIT_CODE,
    'timestamp': datetime.datetime.utcnow().isoformat()
}
print(json.dumps(result, indent=2))
" > /opt/devbox/result.json

          aws s3 cp /opt/devbox/result.json \
            s3://${S3Bucket}/devbox/results/${StackName}.json
          aws s3 cp $LOG \
            s3://${S3Bucket}/devbox/logs/${StackName}/bootstrap.log

          # ── Open PR on success ─────────────────────────────────────────────
          if [ "$STATUS" = "success" ] && [ "$ON_SUCCESS" = "pr" ] && [ "$TASK" = "headless" ]; then
            CHANGES=$(git status --short | wc -l)
            if [ "$CHANGES" -gt 0 ]; then
              git add -A
              git commit -m "devbox: automated changes from ${StackName}"
              git push origin "$BRANCH"
              gh pr create \
                --title "devbox: $BRANCH" \
                --body "Automated PR from MACHpit DevBox worker \`${StackName}\`." \
                --base main || true
            fi
          fi

          # ── Idle shutdown or interactive stay-alive ────────────────────────
          if [ "$TASK" = "interactive" ]; then
            echo "=== Interactive mode - worker alive for ${IdleMinutes} minutes ==="
            systemctl start atd || true
            echo "aws cloudformation delete-stack --stack-name ${StackName} --region ${AWS::Region}" \
              | at "now + ${IdleMinutes} minutes" 2>/dev/null || true
          else
            echo "=== Headless task complete - self-destructing ==="
            aws cloudformation delete-stack \
              --stack-name ${StackName} \
              --region ${AWS::Region} || true
          fi

Outputs:
  InstancePublicIp:
    Description: Worker public IP
    Value: !GetAtt DevBoxInstance.PublicIp
  StackId:
    Description: Worker stack name
    Value: !Ref StackName
